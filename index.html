<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Email Scorer — Rate Your Outreach</title>
<meta name="description" content="Free tool to score and improve your cold emails. Get instant feedback on length, personalization, clarity, and more.">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1e1e2e;
  --border: #2a2a3e;
  --text: #e0e0f0;
  --muted: #8888aa;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

header {
  text-align: center;
  margin-bottom: 2.5rem;
}

h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2), #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

header p {
  color: var(--muted);
  font-size: 1.05rem;
}

.input-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.input-section label {
  display: block;
  font-weight: 600;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.input-section input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  color: var(--text);
  font-size: 1rem;
  margin-bottom: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

.input-section input[type="text"]:focus {
  border-color: var(--accent);
}

.input-section textarea {
  width: 100%;
  min-height: 220px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

.input-section textarea:focus {
  border-color: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 0.85rem 2rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  width: 100%;
  justify-content: center;
  margin-top: 0.5rem;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
}

.btn:active { transform: translateY(0); }

/* Results */
.results { display: none; margin-top: 2rem; }
.results.visible { display: block; }

.overall-score {
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
}

.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 0.75rem;
  position: relative;
}

.score-circle::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  padding: 3px;
  background: conic-gradient(var(--score-color) calc(var(--score-pct) * 3.6deg), var(--surface2) 0);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.score-label {
  font-size: 1.3rem;
  font-weight: 700;
}

.score-subtitle {
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 0.25rem;
}

.dimension-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

@media (max-width: 600px) {
  .dimension-grid { grid-template-columns: 1fr; }
  h1 { font-size: 1.6rem; }
}

.dimension-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
}

.dimension-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.dimension-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.dimension-score {
  font-weight: 700;
  font-size: 1.1rem;
  padding: 0.15rem 0.6rem;
  border-radius: 6px;
}

.dimension-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 0.6rem;
}

.dimension-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.dimension-tip {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.5;
}

.tips-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.tips-section h3 {
  font-size: 1.1rem;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.tip-item {
  display: flex;
  gap: 0.75rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
}

.tip-item:last-child { border-bottom: none; }

.tip-icon {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  margin-top: 2px;
}

.tip-text {
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.5;
}

footer {
  text-align: center;
  padding: 2rem 0;
  color: var(--muted);
  font-size: 0.8rem;
}

footer a {
  color: var(--accent2);
  text-decoration: none;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Cold Email Scorer</h1>
    <p>Paste your cold email. Get instant, actionable feedback.</p>
  </header>

  <div class="input-section">
    <label>Subject Line</label>
    <input type="text" id="subjectLine" placeholder="e.g. Quick question about your ML pipeline">
    <label>Email Body</label>
    <textarea id="emailBody" placeholder="Paste your cold email here..."></textarea>
    <button class="btn" onclick="scoreEmail()">⚡ Score My Email</button>
  </div>

  <div class="results" id="results">
    <div class="overall-score" id="overallScore"></div>
    <div class="dimension-grid" id="dimensionGrid"></div>
    <div class="tips-section" id="tipsSection"></div>
  </div>
</div>

<!-- Ad placement -->
<div style="max-width:860px;margin:0 auto;padding:0 1.5rem 1rem;">
  <div id="ad-slot" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center;">
    <script async type="text/javascript" src="//cdn.carbonads.com/carbon.js?serve=CWYDP27Y&placement=michael-ami-01aboriocom" id="_carbonads_js"></script>
    <noscript><span style="color:var(--muted);font-size:0.85rem;">Ad slot — <a href="mailto:michael_ami_01@yahoo.com" style="color:var(--accent2)">sponsor this tool</a></span></noscript>
  </div>
</div>

<footer>
  Built by <a href="https://github.com/mzio" target="_blank">Michael Zhang</a> ·
  <a href="https://michael-ami-01.github.io" target="_blank">More Tools</a>
</footer>

<script>
function scoreEmail() {
  const subject = document.getElementById('subjectLine').value.trim();
  const body = document.getElementById('emailBody').value.trim();

  if (!body) { alert('Paste an email body to score.'); return; }

  const scores = analyze(subject, body);
  render(scores);
}

function analyze(subject, body) {
  const words = body.split(/\s+/).filter(Boolean);
  const sentences = body.split(/[.!?]+/).filter(s => s.trim());
  const wc = words.length;
  const sc = sentences.length;
  const avgSentLen = sc ? wc / sc : wc;

  const dims = [];

  // 1. Length (sweet spot: 50-150 words)
  let lengthScore, lengthTip;
  if (wc < 30) { lengthScore = 3; lengthTip = "Too short — you haven't given them enough reason to reply. Aim for 50-125 words."; }
  else if (wc < 50) { lengthScore = 6; lengthTip = "A bit brief. Add one more concrete value proposition or proof point."; }
  else if (wc <= 125) { lengthScore = 10; lengthTip = "Perfect length. Short enough to read in 30 seconds, long enough to be substantive."; }
  else if (wc <= 175) { lengthScore = 7; lengthTip = "Getting long. Cut filler words and merge sentences. Every word should earn its place."; }
  else if (wc <= 250) { lengthScore = 4; lengthTip = "Too long for a cold email. Most recipients won't read past the first 3 lines. Cut by 40%."; }
  else { lengthScore = 2; lengthTip = `At ${wc} words, this is a wall of text. Ruthlessly cut to under 125 words.`; }
  dims.push({ name: "Length", score: lengthScore, tip: lengthTip });

  // 2. Personalization signals
  const persPatterns = [
    /\byour (company|team|product|blog|post|article|talk|podcast|work|recent|latest)\b/i,
    /\bI (saw|read|noticed|loved|enjoyed|watched|heard|found)\b.*\byou\b/i,
    /\byou\b.*\b(mentioned|wrote|said|shared|published|launched|built|announced)\b/i,
    /congrat/i,
    /\bI've been (following|reading|watching)\b/i,
  ];
  const persHits = persPatterns.filter(p => p.test(body)).length;
  const hasName = /\b(Hi|Hey|Hello|Dear)\s+[A-Z][a-z]+/i.test(body);
  let persScore = Math.min(10, persHits * 3 + (hasName ? 2 : 0));
  if (persScore === 0) persScore = 1;
  const persTip = persScore >= 7
    ? "Strong personalization — the recipient can tell this isn't a blast."
    : persScore >= 4
    ? "Some personalization present. Reference something specific they did or said to stand out more."
    : "This reads like a template. Add at least one specific detail about the recipient's work.";
  dims.push({ name: "Personalization", score: persScore, tip: persTip });

  // 3. Clarity / readability
  const complexWords = words.filter(w => w.length > 12).length;
  const jargon = (body.match(/\b(synerg|leverage|paradigm|disrupt|innovat|scalab|ecosystem|best-in-class|world-class|cutting-edge|game-chang|next-gen|empower|holistic|robust|utilize|optimize|streamline)\w*/gi) || []).length;
  let clarityScore = 10 - Math.min(5, Math.floor(complexWords / 3)) - Math.min(4, jargon * 2);
  if (avgSentLen > 25) clarityScore -= 2;
  if (avgSentLen > 35) clarityScore -= 2;
  clarityScore = Math.max(1, Math.min(10, clarityScore));
  const clarityTip = clarityScore >= 7
    ? "Clear, readable prose. Easy to scan and understand quickly."
    : clarityScore >= 4
    ? "Some jargon or complex sentences detected. Simplify — write like you're texting a smart friend."
    : "Heavy jargon and complex sentences. Strip the buzzwords. Short sentences, plain words.";
  dims.push({ name: "Clarity", score: clarityScore, tip: clarityTip });

  // 4. Call to Action
  const ctaPatterns = [
    /\b(would you be open|are you open|interested in|worth a chat|grab (a )?time|quick call|15 min|free (this|next) week|calendar|schedule|let me know|thoughts\??)\b/i,
    /\?$/m,
  ];
  const ctaHits = ctaPatterns.filter(p => p.test(body)).length;
  const endsWithQuestion = /\?\s*$/.test(body.trim());
  const multiCTA = (body.match(/\?/g) || []).length;
  let ctaScore;
  if (ctaHits === 0) { ctaScore = 2; }
  else if (endsWithQuestion && multiCTA <= 2) { ctaScore = 10; }
  else if (endsWithQuestion) { ctaScore = 7; }
  else { ctaScore = 6; }
  if (multiCTA > 3) ctaScore = Math.max(3, ctaScore - 3);
  ctaScore = Math.max(1, Math.min(10, ctaScore));
  const ctaTip = ctaScore >= 7
    ? "Clear, single CTA that's easy to say yes to. Nice."
    : ctaScore >= 4
    ? "CTA could be sharper. End with one specific, low-commitment question."
    : "No clear ask. End with a single question — 'Would you be open to a 15-min chat this week?'";
  dims.push({ name: "Call to Action", score: ctaScore, tip: ctaTip });

  // 5. Subject Line
  let subScore, subTip;
  if (!subject) {
    subScore = 0;
    subTip = "No subject line provided. It's the first thing they see — make it count.";
  } else {
    const subWords = subject.split(/\s+/).length;
    subScore = 6;
    if (subWords <= 7 && subWords >= 2) subScore += 2;
    if (subWords > 10) subScore -= 3;
    if (/\b(re:|fwd:)\b/i.test(subject)) subScore -= 2;
    if (/\b(free|guaranteed|act now|limited time|exclusive|!!|💰|🔥)\b/i.test(subject)) subScore -= 3;
    if (/\b(quick question|thoughts on|idea for)\b/i.test(subject)) subScore += 1;
    if (/[A-Z]{3,}/.test(subject)) subScore -= 2;
    subScore = Math.max(1, Math.min(10, subScore));
    subTip = subScore >= 7
      ? "Subject line is concise and natural. Should get opens."
      : subScore >= 4
      ? "Subject line could be shorter or more specific. Aim for 3-7 words, no spam triggers."
      : "Subject line has red flags (too long, spammy words, or ALL CAPS). Keep it casual and short.";
  }
  dims.push({ name: "Subject Line", score: subScore, tip: subTip });

  // 6. Spam signals
  const spamWords = (body.match(/\b(guarantee|risk.free|act now|limited time|exclusive offer|click (here|below)|unsubscribe|buy now|free trial|no obligation|100%|!!|💰)\b/gi) || []).length;
  const linkCount = (body.match(/https?:\/\//g) || []).length;
  const exclamations = (body.match(/!/g) || []).length;
  let spamScore = 10 - spamWords * 2 - Math.max(0, linkCount - 1) * 2 - Math.max(0, exclamations - 1);
  spamScore = Math.max(1, Math.min(10, spamScore));
  const spamTip = spamScore >= 8
    ? "Clean — no obvious spam triggers. Should land in the primary inbox."
    : spamScore >= 5
    ? "Some spam signals detected (links, exclamation marks, or sales language). Tone it down."
    : "High spam risk. Remove sales language, limit to one link max, and cut the exclamation marks.";
  dims.push({ name: "Spam Safety", score: spamScore, tip: spamTip });

  const overall = Math.round(dims.reduce((s, d) => s + d.score, 0) / dims.length * 10);
  return { overall, dims, wc, sc };
}

function getColor(score) {
  if (score >= 8) return 'var(--green)';
  if (score >= 5) return 'var(--yellow)';
  return 'var(--red)';
}

function getOverallColor(score) {
  if (score >= 75) return 'var(--green)';
  if (score >= 50) return 'var(--yellow)';
  return 'var(--red)';
}

function getGrade(score) {
  if (score >= 90) return 'Excellent';
  if (score >= 75) return 'Good';
  if (score >= 60) return 'Decent';
  if (score >= 40) return 'Needs Work';
  return 'Rough';
}

function render(scores) {
  const container = document.getElementById('results');
  container.classList.add('visible');

  // Overall
  const oc = getOverallColor(scores.overall);
  document.getElementById('overallScore').innerHTML = `
    <div class="score-circle" style="--score-color: ${oc}; --score-pct: ${scores.overall}; background: var(--surface2);">
      <span style="color: ${oc}">${scores.overall}</span>
    </div>
    <div class="score-label" style="color: ${oc}">${getGrade(scores.overall)}</div>
    <div class="score-subtitle">${scores.wc} words · ${scores.sc} sentences</div>
  `;

  // Dimensions
  const grid = document.getElementById('dimensionGrid');
  grid.innerHTML = scores.dims.map(d => {
    const c = getColor(d.score);
    return `<div class="dimension-card">
      <div class="dimension-header">
        <span class="dimension-name">${d.name}</span>
        <span class="dimension-score" style="color: ${c}; background: ${c}20;">${d.score}/10</span>
      </div>
      <div class="dimension-bar">
        <div class="dimension-fill" style="width: ${d.score * 10}%; background: ${c};"></div>
      </div>
      <div class="dimension-tip">${d.tip}</div>
    </div>`;
  }).join('');

  // Tips
  const weakest = [...scores.dims].sort((a, b) => a.score - b.score).slice(0, 3).filter(d => d.score < 8);
  const tips = document.getElementById('tipsSection');
  if (weakest.length === 0) {
    tips.innerHTML = `<h3>💪 Looking solid!</h3><p style="color: var(--muted)">Your email scores well across all dimensions. Ship it.</p>`;
  } else {
    tips.innerHTML = `<h3>🎯 Top Improvements</h3>` + weakest.map(d => {
      const c = getColor(d.score);
      return `<div class="tip-item">
        <div class="tip-icon" style="background: ${c}20; color: ${c};">→</div>
        <div class="tip-text"><strong>${d.name}</strong>: ${d.tip}</div>
      </div>`;
    }).join('');
  }

  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
